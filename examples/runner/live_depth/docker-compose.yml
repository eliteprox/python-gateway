services:
  # Mirrors go-livepeer/doc/byoc.md: on-chain mode against a public Arbitrum
  # RPC, but `pricePerUnit 0` keeps the registration free — no balance ever
  # leaves the auto-generated keystore. No real chain interaction occurs.

  orchestrator:
    image: livepeer/go-livepeer:master
    container_name: orchestrator
    network_mode: host
    command: >
      -network arbitrum-one-mainnet
      -orchestrator
      -ethUrl https://arb1.arbitrum.io/rpc
      -ethPassword secret-password
      -pricePerUnit 0
      -serviceAddr=${LIVEPEER_HOST_IP:-127.0.0.1}:8935
      -orchSecret=orch-secret
      -v 6

  # RTMP frontend for local demos that still pull/push RTMP media.
  mediamtx:
    build:
      context: .
      dockerfile: Dockerfile.mediamtx
    container_name: mediamtx
    ports:
      - "1935:1935"   # RTMP push/pull
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  live_depth:
    build:
      context: ../../..
      dockerfile: examples/runner/live_depth/Dockerfile
    container_name: live_depth
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Enable GPU access — requires nvidia-container-toolkit on the host.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Healthcheck waits for setup() to load the model on GPU. Larger start_period than the CPU examples so model load + first warm pass don't fail health probes.
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 60s
    environment:
      LIVEPEER_ORCH_URL:        https://host.docker.internal:8935
      LIVEPEER_ORCH_SECRET:     orch-secret
      LIVEPEER_CAPABILITY_NAME: live-depth
      LIVEPEER_CAPABILITY_URL:  http://host.docker.internal:5000
    depends_on:
      - orchestrator

networks:
  default:
    name: livepeer
