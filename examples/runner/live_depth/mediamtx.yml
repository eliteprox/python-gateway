# Local RTMP helper for demos. The Python SDK owns BYOC session start/update/stop.

# Gateway hits the API from another container for stream-exists checks and
# input kicks; default ACL is localhost-only and would 401.
api: yes
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api

paths:
  '~.*-out$':
    runOnReadyRestart: no
  all_others:
    runOnReadyRestart: no
