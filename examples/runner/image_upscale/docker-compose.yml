services:
  # Mirrors go-livepeer/doc/byoc.md: on-chain mode against a public Arbitrum
  # RPC, but `pricePerUnit 0` keeps the registration free — no balance ever
  # leaves the auto-generated keystore. No real chain interaction occurs.

  orchestrator:
    image: livepeer/go-livepeer:master
    container_name: orchestrator
    command: >
      -network arbitrum-one-mainnet
      -orchestrator
      -ethUrl https://arb1.arbitrum.io/rpc
      -ethPassword secret-password
      -pricePerUnit 0
      -serviceAddr=orchestrator:8935
      -orchSecret=orch-secret
      -v 6

  # TODO: see README — service removed after migration to the Python client SDK.
  gateway:
    image: livepeer/go-livepeer:master
    container_name: gateway
    command: >
      -network arbitrum-one-mainnet
      -gateway
      -ethUrl https://arb1.arbitrum.io/rpc
      -ethPassword secret-password
      -orchAddr=orchestrator:8935
      -httpAddr=0.0.0.0:9935
      -httpIngest
      -v 6
    ports:
      - "9935:9935"
    depends_on:
      - orchestrator

  image_upscale:
    build:
      context: ../../..
      dockerfile: examples/runner/image_upscale/Dockerfile
    container_name: image_upscale
    ports:
      - "5000:5000"
    # Healthcheck waits for setup() to finish loading the model before the
    # orchestrator can route requests here. Without this, register_capability
    # could complete and the test could fire before the model is loaded.
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    environment:
      LIVEPEER_ORCH_URL:        https://orchestrator:8935
      LIVEPEER_ORCH_SECRET:     orch-secret
      LIVEPEER_CAPABILITY_NAME: image-upscale
      LIVEPEER_CAPABILITY_URL:  http://image_upscale:5000
    depends_on:
      - orchestrator

networks:
  default:
    name: livepeer
