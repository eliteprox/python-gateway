services:
  # Mirrors go-livepeer/doc/byoc.md: on-chain mode against a public Arbitrum
  # RPC, but `pricePerUnit 0` keeps the registration free — no balance ever
  # leaves the auto-generated keystore. No real chain interaction occurs.

  orchestrator:
    image: livepeer/go-livepeer:master
    container_name: orchestrator
    network_mode: host
    command: >
      -network arbitrum-one-mainnet
      -orchestrator
      -ethUrl https://arb1.arbitrum.io/rpc
      -ethPassword secret-password
      -pricePerUnit 0
      -serviceAddr=${LIVEPEER_HOST_IP:-127.0.0.1}:8935
      -orchSecret=orch-secret
      -v 6

  sentiment:
    build:
      context: ../../..
      dockerfile: examples/runner/sentiment/Dockerfile
    container_name: sentiment
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Healthcheck waits for setup() to finish loading the model before the
    # orchestrator can route requests here. Without this, register_capability
    # could complete and the test could fire before the model is loaded.
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    environment:
      LIVEPEER_ORCH_URL:        https://host.docker.internal:8935
      LIVEPEER_ORCH_SECRET:     orch-secret
      LIVEPEER_CAPABILITY_NAME: sentiment
      LIVEPEER_CAPABILITY_URL:  http://host.docker.internal:5000
    depends_on:
      - orchestrator

networks:
  default:
    name: livepeer
