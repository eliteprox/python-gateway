<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livepeer AI Video — Streaming Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #eee; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; }

  .header { padding: 12px 20px; background: #1a1a2e; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .badge { font-size: 10px; color: #999; background: #2a2a3a; padding: 2px 8px; border-radius: 10px; }

  .config { padding: 14px 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select { background: #222; border: 1px solid #444; color: #eee; padding: 7px 10px; border-radius: 4px; font-size: 13px; outline: none; }
  .field input:focus, .field select:focus { border-color: #666; }
  .field input[readonly] { opacity: 0.5; }

  .btn { padding: 8px 20px; border: none; border-radius: 5px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.15s; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-start { background: #22c55e; color: #fff; }
  .btn-stop  { background: #ef4444; color: #fff; }

  .error { padding: 8px 20px; background: #2d1010; border-bottom: 1px solid #5c2020; color: #f87171; font-size: 12px; display: none; }

  .panels { flex: 1; display: flex; justify-content: center; align-items: center; gap: 24px; padding: 20px; flex-wrap: wrap; min-height: 0; overflow: auto; }
  .panel { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .panel-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  canvas { background: #000; border-radius: 8px; border: 1px solid #333; max-width: 100%; }

  .stats { padding: 8px 20px; background: #1a1a1a; border-top: 1px solid #333; display: flex; gap: 28px; font-size: 12px; color: #888; flex-wrap: wrap; }
  .stats .val { color: #eee; font-variant-numeric: tabular-nums; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-right: 4px; }

  .logs { padding: 8px 20px; background: #0a0a0a; border-top: 1px solid #222; font-size: 11px; color: #666; max-height: 110px; overflow-y: auto; font-family: "SF Mono", Menlo, Consolas, monospace; line-height: 1.5; }
  .logs div { white-space: nowrap; }

  .source-toggle { display: flex; gap: 0; border-radius: 5px; overflow: hidden; border: 1px solid #444; }
  .source-toggle button { padding: 7px 14px; border: none; background: #222; color: #888; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .source-toggle button.active { background: #2a2a4e; color: #eee; }
</style>
</head>
<body>

<div class="header">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
  <h1>Livepeer AI Video</h1>
  <span class="badge">pymthouse.com SDK Demo</span>
</div>

<div class="config">
  <div class="field">
    <label>Billing</label>
    <input type="text" value="pymthouse.com" readonly style="width:150px">
  </div>
  <div class="field">
    <label>Model ID</label>
    <input id="modelId" type="text" value="noop" style="width:140px" placeholder="noop">
  </div>
  <div class="field">
    <label>FPS</label>
    <select id="fpsSelect" style="width:70px">
      <option value="8">8</option>
      <option value="15">15</option>
      <option value="24" selected>24</option>
      <option value="30">30</option>
    </select>
  </div>
  <div class="field">
    <label>Video Source</label>
    <div class="source-toggle">
      <button id="srcWebcam" onclick="setSource('webcam')">Webcam</button>
      <button id="srcSynthetic" class="active" onclick="setSource('synthetic')">Synthetic</button>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <button id="btnStart" class="btn btn-start" onclick="handleStart()">&#9654; Start</button>
    <button id="btnStop"  class="btn btn-stop" disabled onclick="handleStop()">&#9632; Stop</button>
  </div>
</div>

<div id="errorBar" class="error"></div>

<div class="panels">
  <div class="panel">
    <span class="panel-label">Input</span>
    <canvas id="inputCanvas" width="640" height="480"></canvas>
  </div>
  <div class="panel">
    <span class="panel-label">AI Output</span>
    <canvas id="outputCanvas" width="640" height="480"></canvas>
  </div>
</div>

<div class="stats">
  <span>Status: <span class="dot" id="statusDot" style="background:#f44336"></span><span class="val" id="statusText">Disconnected</span></span>
  <span>Send: <span class="val" id="sendFps">0</span> fps</span>
  <span>Recv: <span class="val" id="recvFps">0</span> fps</span>
  <span>Latency: <span class="val" id="latency">--</span></span>
  <span>Sent: <span class="val" id="framesSent">0</span></span>
  <span>Recv: <span class="val" id="framesRecv">0</span></span>
</div>

<div class="logs" id="logPanel"></div>

<!-- Hidden elements for camera capture -->
<video id="hiddenVideo" autoplay playsinline muted style="display:none"></video>
<canvas id="captureCanvas" width="640" height="480" style="display:none"></canvas>

<script>
const W = 640, H = 480;

let videoSource = 'synthetic';
let stream = null;
let ws = null;
let sendInterval = null;
let cameraRaf = null;
let running = false;
let framesSentCount = 0;
let framesRecvCount = 0;
let lastSendTime = 0;
let syntheticFrameIdx = 0;
const sendTs = [], recvTs = [];

const $ = id => document.getElementById(id);

function log(msg) {
  const ts = new Date().toLocaleTimeString();
  const el = $('logPanel');
  const d = document.createElement('div');
  d.textContent = `[${ts}] ${msg}`;
  el.appendChild(d);
  if (el.children.length > 80) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
}

function setStatus(s) {
  const colors = { disconnected: '#f44336', connecting: '#ff9800', starting_job: '#ff9800', connected: '#22c55e' };
  $('statusDot').style.background = colors[s] || '#888';
  const labels = { disconnected: 'Disconnected', connecting: 'Connecting...', starting_job: 'Starting Job...', connected: 'Connected' };
  $('statusText').textContent = labels[s] || s;
}

function showError(msg) {
  $('errorBar').textContent = msg;
  $('errorBar').style.display = msg ? 'block' : 'none';
}

function getFps() { return parseInt($('fpsSelect').value, 10) || 24; }

function setSource(src) {
  videoSource = src;
  $('srcWebcam').classList.toggle('active', src === 'webcam');
  $('srcSynthetic').classList.toggle('active', src === 'synthetic');
}

// Stats updater
setInterval(() => {
  const now = Date.now(), win = 2000;
  while (sendTs.length && now - sendTs[0] > win) sendTs.shift();
  while (recvTs.length && now - recvTs[0] > win) recvTs.shift();
  $('sendFps').textContent = Math.round(sendTs.length / (win / 1000));
  $('recvFps').textContent = Math.round(recvTs.length / (win / 1000));
  $('framesSent').textContent = framesSentCount;
  $('framesRecv').textContent = framesRecvCount;
}, 500);

// Ping for latency measurement
let lastPingTime = 0;
function sendPing() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    lastPingTime = Date.now();
    ws.send(JSON.stringify({ type: 'ping', ts: lastPingTime }));
  }
}

// ---- Camera input ----

function drawCameraPreview() {
  const video = $('hiddenVideo'), canvas = $('inputCanvas');
  const ctx = canvas.getContext('2d');
  if (video.readyState >= 2) ctx.drawImage(video, 0, 0, W, H);
  if (running && videoSource === 'webcam') cameraRaf = requestAnimationFrame(drawCameraPreview);
}

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { width: W, height: H, frameRate: getFps() }, audio: false
  });
  const video = $('hiddenVideo');
  video.srcObject = stream;
  await video.play();
  cameraRaf = requestAnimationFrame(drawCameraPreview);
  log('Camera started');
}

function stopCamera() {
  if (cameraRaf) { cancelAnimationFrame(cameraRaf); cameraRaf = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  $('hiddenVideo').srcObject = null;
}

// ---- Synthetic frame generator ----

function drawSyntheticFrame() {
  const canvas = $('inputCanvas');
  const ctx = canvas.getContext('2d');
  const idx = syntheticFrameIdx++;
  const t = idx * 0.02;

  // Gradient background
  const grad = ctx.createLinearGradient(0, 0, W, H);
  const r = Math.floor((Math.sin(t * 0.7) * 0.5 + 0.5) * 255);
  const g = Math.floor((Math.sin(t * 0.5 + 2) * 0.5 + 0.5) * 255);
  const b = Math.floor((Math.sin(t * 0.3 + 4) * 0.5 + 0.5) * 255);
  grad.addColorStop(0, `rgb(${r},${g},${b})`);
  grad.addColorStop(1, `rgb(${255-r},${255-g},${255-b})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Moving shapes
  const cx = W / 2 + Math.cos(t * 1.3) * 180;
  const cy = H / 2 + Math.sin(t * 0.9) * 120;

  ctx.beginPath();
  ctx.arc(cx, cy, 60, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,0.5)`;
  ctx.fill();

  const bx = W / 2 + Math.sin(t * 1.1) * 200;
  const by = H / 2 + Math.cos(t * 1.5) * 100;
  ctx.fillStyle = `rgba(0,0,0,0.3)`;
  ctx.fillRect(bx - 40, by - 40, 80, 80);

  // Frame counter overlay
  ctx.fillStyle = '#fff';
  ctx.font = '16px monospace';
  ctx.fillText(`Frame: ${idx}`, 16, 28);

  if (running && videoSource === 'synthetic') requestAnimationFrame(drawSyntheticFrame);
}

// ---- Frame sending ----

function startSending() {
  if (sendInterval) return;
  const fps = getFps();
  sendInterval = setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    let sourceCanvas;
    if (videoSource === 'webcam') {
      const video = $('hiddenVideo');
      const cap = $('captureCanvas');
      if (video.readyState < 2) return;
      cap.getContext('2d').drawImage(video, 0, 0, W, H);
      sourceCanvas = cap;
    } else {
      sourceCanvas = $('inputCanvas');
    }

    sourceCanvas.toBlob(blob => {
      if (!blob || !ws || ws.readyState !== WebSocket.OPEN) return;
      blob.arrayBuffer().then(buf => {
        ws.send(buf);
        framesSentCount++;
        lastSendTime = Date.now();
        sendTs.push(lastSendTime);
      });
    }, 'image/jpeg', 0.8);
  }, 1000 / fps);
}

function stopSending() {
  if (sendInterval) { clearInterval(sendInterval); sendInterval = null; }
}

// ---- Main controls ----

async function handleStart() {
  showError('');
  running = true;
  framesSentCount = 0;
  framesRecvCount = 0;
  syntheticFrameIdx = 0;
  sendTs.length = 0;
  recvTs.length = 0;
  $('btnStart').disabled = true;
  $('btnStop').disabled = false;
  setStatus('connecting');

  const outCtx = $('outputCanvas').getContext('2d');
  outCtx.clearRect(0, 0, W, H);

  try {
    if (videoSource === 'webcam') {
      await startCamera();
    } else {
      log('Synthetic frame source active');
      requestAnimationFrame(drawSyntheticFrame);
    }

    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const model = $('modelId').value || 'noop';
    const fps = getFps();
    const wsUrl = `${wsProto}//${location.host}/ws/stream?model_id=${encodeURIComponent(model)}&fps=${fps}`;
    log(`Connecting: ${wsUrl}`);

    ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      log('WebSocket connected, waiting for job...');
      setStatus('connecting');
    };

    ws.onmessage = (event) => {
      if (typeof event.data === 'string') {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'status') {
            setStatus(msg.status);
            if (msg.job_id) log(`Job ID: ${msg.job_id}`);
            if (msg.status === 'connected') {
              log('Job started, streaming frames');
              startSending();
            }
          } else if (msg.type === 'pong' && lastPingTime) {
            $('latency').textContent = (Date.now() - lastPingTime) + 'ms';
          } else if (msg.type === 'error') {
            showError(msg.message);
            log(`Server error: ${msg.message}`);
          }
        } catch (e) {}
        return;
      }

      // Binary: output JPEG frame
      framesRecvCount++;
      recvTs.push(Date.now());
      if (lastSendTime > 0) {
        $('latency').textContent = (Date.now() - lastSendTime) + 'ms';
      }
      if (framesRecvCount === 1) log('First output frame received');
      const blob = new Blob([event.data], { type: 'image/jpeg' });
      createImageBitmap(blob).then(bmp => {
        const ctx = $('outputCanvas').getContext('2d');
        ctx.drawImage(bmp, 0, 0, W, H);
        bmp.close();
      }).catch(err => { if (framesRecvCount <= 3) log('Output decode error: ' + err.message); });
    };

    ws.onclose = (e) => {
      log(`WebSocket closed: ${e.reason || e.code}`);
      setStatus('disconnected');
      stopSending();
    };

    ws.onerror = () => log('WebSocket error');

  } catch (err) {
    log(`Error: ${err.message}`);
    showError(err.message);
    cleanup();
  }
}

async function handleStop() {
  stopSending();
  if (ws) { ws.close(); ws = null; }
  stopCamera();
  running = false;
  $('btnStart').disabled = false;
  $('btnStop').disabled = true;
  setStatus('disconnected');
  log('Stopped');
}

function cleanup() {
  stopSending();
  if (ws) { ws.close(); ws = null; }
  stopCamera();
  running = false;
  $('btnStart').disabled = false;
  $('btnStop').disabled = true;
  setStatus('disconnected');
}
</script>
</body>
</html>
